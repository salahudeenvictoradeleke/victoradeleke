<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Promotion Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
  <section class="py-20 px-4">
    <div class="max-w-6xl mx-auto text-center">
      <h1 class="text-blue-600 text-5xl md:text-6xl font-bold text-center mb-4">
        Get your Business Promoted Today
      </h1>
      <h3 class="text-gray-800 text-xl md:text-2xl text-center mb-8">
        100% Customer conversion guaranteed
      </h3>

      <form class="bg-white/70 backdrop-blur-sm p-6 md:p-8 rounded-2xl shadow-lg max-w-2xl mx-auto my-10">
        <div class="flex flex-col md:flex-row gap-4 items-center">
          <input 
            type="text" 
            name="name" 
            placeholder="Enter your name" 
            required
            class="border border-gray-300 rounded-lg px-4 py-3 w-full focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          >
          <input 
            type="email" 
            name="email" 
            placeholder="Enter your email" 
            required
            class="border border-gray-300 rounded-lg px-4 py-3 w-full focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
          >
          <button 
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg w-full md:w-auto transition"
          >
            Get Started
          </button>
        </div>
        <p class="text-gray-600 text-xs text-center mt-4">
          By signing up you agree to receive emails. Unsubscribe anytime.
        </p>
      </form>
    </div>
  </section>
</body>
</html>
